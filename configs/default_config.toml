# Sonar Configuration

# ~~~~~ CONNECTION PARAMETERS ~~~~~

[connection]

# ----- Device Name / Port -----
# Specify either device name for auto port detection or hardcode port.
# Will auto detect by name if no port specified
device_name = "/dev/ttyAMA0"
port = ""

# ~~~~~ CTD CONFIGURATIONS ~~~~~
# Chart listing deployment settings available in the /docs directory.

[settings]

# ----- Interval -----
# Sampling interval in seconds
# Float 1.0 - 15300.0

interval = 1.0

# ----- Pressure -----
# Water pressure in kPa
# Float 0.0 - 110000.0

pressure = 0.0

